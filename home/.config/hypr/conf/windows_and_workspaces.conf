##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

#===Bug fix=============================================
windowrule {
    # Ignore maximize requests from all apps.
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
#================================================

workspace = special:special, gapsin:5, gapsout:30
windowrule = match:fullscreen yes, immediate yes
windowrule = match:class fcitx5, no_focus yes, float yes
windowrule = match:modal true, float true

windowrule {
  name = YTMusic
  match:class = chrome-music.youtube.com__-Default
  workspace = special
  opacity = 0.7
}

windowrule {
    name = float-btop
    match:class = btop
    float = yes
}

windowrule {
    name = Virtual-Box
    match:class = VirtualBox Machine
    fullscreen = yes
}

windowrule {
    name = GPU Screen Recorder Notify
    match:title  = gsr notify
    rounding = 0
    no_focus = true
}

windowrule {
    name = Vesktop
    match:class = vesktop
    workspace = special
    opacity = 0.9
}

windowrule {
  name = UnrealEditor
  match:class = UnrealEditor
  border_size = 0
  decorate = no
  no_blur = yes
  no_dim = yes
  no_shadow = yes
}